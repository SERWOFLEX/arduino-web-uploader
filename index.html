<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>KRASNALE PROGRAMY TEST</title>

<script src="https://github.com/SERWOFLEX/arduino-web-uploader/releases/download/v1.1.2/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/intel-hex@0.2.0/dist/intel-hex.min.js"></script>
<script src="./stk500v2.js"></script>

</head>

<body>

<center>

<h1>OPROGRAMOWANIE KRASNALE</h1>

<!-- MEGA -->
<button type="button" onclick="flashMega()">
CENTRALNY NOWY OK[<span id="mega-progress"></span>]
</button>

<br><br>

<!-- NANO -->
<button arduino-uploader hex-href="./test/Blink.hex" board="nanoOldBootloader" verify>
KAROCA [<span class="upload-progress"></span>]
</button>

<br><br>

<button arduino-uploader hex-href="./test/Blink.hex" board="nano" verify>
LAMPA KOLO [<span class="upload-progress"></span>]
</button>

<br><br>

<button arduino-uploader hex-href="./test/Blink.hex" board="nanoOldBootloader" verify>
ZAPACHY [<span class="upload-progress"></span>]
</button>

<br><br>

<button arduino-uploader hex-href="./test/Bootloader.hex" board="nanoOldBootloader" verify>
PIEC [<span class="upload-progress"></span>]
</button>

</center>

<script>





window.flashMega = async function () {

    console.log("START MEGA");

    const r = await fetch("./test/Blink.mega.hex");
    const text = await r.text();

    const hex = parseHex(text);

    const port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });

    const writer = port.writable.getWriter();
    const reader = port.readable.getReader();

    function checksum(buf) {
        let cs = 0;
        for (let b of buf) cs ^= b;
        return cs;
    }

    async function send(seq, payload) {

        const size = payload.length;

        const header = [
            0x1B,
            seq,
            (size >> 8) & 255,
            size & 255,
            0x0E
        ];

        const body = [...header, ...payload];

        const cs = checksum(body);

        const msg = new Uint8Array([...body, cs]);

        await writer.write(msg);

        const res = await reader.read();

        return res.value;
    }

    // reset
    await port.setSignals({ dataTerminalReady: false });
    await new Promise(r => setTimeout(r,100));
    await port.setSignals({ dataTerminalReady: true });
    await new Promise(r => setTimeout(r,300));

    console.log("BOOTLOADER READY");

    await send(1,[0x01]);

    console.log("SIGN_ON OK");

    const pageSize = 256;
    let address = 0;

    for (let i = 0; i < hex.length; i += pageSize) {

        const page = hex.slice(i, i + pageSize);

        await send(2,[
            0x06,
            (address >> 24) & 255,
            (address >> 16) & 255,
            (address >> 8) & 255,
            address & 255
        ]);

        await send(3,[
            0x13,
            (page.length >> 8) & 255,
            page.length & 255,
            0xC1,0x0A,0x40,0x4C,0x20,
            ...page
        ]);

        address += pageSize / 2;

        console.log("FLASH PAGE", i / pageSize);
    }

    console.log("UPLOAD COMPLETE");

    writer.releaseLock();
    reader.releaseLock();

    await port.close();

}
function parseHex(hexText)
{
    const lines = hexText.trim().split('\n');
    let maxAddr = 0;
    let mem = {};

    for (let line of lines)
    {
        if (line[0] !== ':') continue;

        const len = parseInt(line.substr(1,2),16);
        const addr = parseInt(line.substr(3,4),16);
        const type = parseInt(line.substr(7,2),16);

        if (type === 0) // data
        {
            for (let i=0;i<len;i++)
            {
                const b = parseInt(line.substr(9+i*2,2),16);
                mem[addr+i] = b;
                if(addr+i > maxAddr) maxAddr = addr+i;
            }
        }
    }

    const data = new Uint8Array(maxAddr+1).fill(0xFF);

    for (let a in mem)
        data[a] = mem[a];

    return data;
}
</script>
</script>

</script>

</body>
</html>
