<script>
  
function parseHex(hexText)
{
    const lines = hexText.trim().split(/\r?\n/);

    let upper = 0;
    let maxAddr = 0;
    const mem = {};

    for (const line of lines)
    {
        if (line[0] !== ':') continue;

        const len  = parseInt(line.substr(1,2),16);
        const addr = parseInt(line.substr(3,4),16);
        const type = parseInt(line.substr(7,2),16);

        if (type === 0) // data
        {
            const base = upper + addr;

            for (let i=0;i<len;i++)
            {
                const byte = parseInt(line.substr(9+i*2,2),16);
                mem[base+i] = byte;
                if (base+i > maxAddr) maxAddr = base+i;
            }
        }

        else if (type === 4) // extended linear address
        {
            upper = parseInt(line.substr(9,4),16) << 16;
        }

        else if (type === 1) // EOF
        {
            break;
        }
    }

    const data = new Uint8Array(maxAddr+1).fill(0xFF);

    for (const a in mem)
        data[a] = mem[a];

    return data;
}
async function detectBootloader(port)
{
    await port.open({ baudRate: 115200 });

    // reset
    await port.setSignals({ dataTerminalReady: false });
    await new Promise(r => setTimeout(r,200));
    await port.setSignals({ dataTerminalReady: true });
    await new Promise(r => setTimeout(r,400));

    const writer = port.writable.getWriter();
    const reader = port.readable.getReader();

    // STK500v2 GET_PARAMETER
    const cmd = new Uint8Array([
        0x1B,0x01,0x00,0x02,0x0E,
        0x03, // GET_PARAMETER
        0x91,
        0x95
    ]);

    await writer.write(cmd);

    let res = null;

    try
    {
        res = await Promise.race([
            reader.read(),
            new Promise((_,reject)=>setTimeout(()=>reject(),400))
        ]);
    }
    catch {}

    writer.releaseLock();
    reader.releaseLock();
    await port.close();

    if(res && res.value && res.value.length > 0)
        return "mega2560";

    return "uno";
}

window.flashMega = async function (port) {

let writer;
let reader;    
try
{
    console.log("START MEGA");

    const r = await fetch("./test/BlinkM.ino.hex");
    const text = await r.text();

    const hex = parseHex(text);
console.log("HEX LENGTH", hex.length);
console.log("FIRST BYTES", hex.slice(0,16));
   await port.open({ baudRate: 115200 });

    writer = port.writable.getWriter();
reader = port.readable.getReader();

    function checksum(buf) {
        let cs = 0;
        for (let b of buf) cs ^= b;
        return cs;
    }

   async function send(seq, payload)
{
    const size = payload.length;

    const header = [
        0x1B,
        seq,
        (size >> 8) & 255,
        size & 255,
        0x0E
    ];

    const body = [...header, ...payload];

    const cs = checksum(body);

    const msg = new Uint8Array([...body, cs]);

    await writer.write(msg);

    let buffer = [];

    while(true)
    {
        const res = await Promise.race([
            reader.read(),
            new Promise((_,reject)=>setTimeout(()=>reject("timeout"),1000))
        ]);

        if(!res.value)
            break;

        buffer.push(...res.value);

        if(buffer.length >= 7)
            break;
    }

    console.log("BOOT RESP:", buffer);

    return buffer;
}
    // reset
    await port.setSignals({ dataTerminalReady: false });
    await new Promise(r => setTimeout(r,100));
    await port.setSignals({ dataTerminalReady: true });
    await new Promise(r => setTimeout(r,300));

    console.log("BOOTLOADER READY");

    await send(1,[0x01]); // SIGN_ON

    console.log("SIGN_ON OK");
    
await send(2,[0x12]);
console.log("CHIP ERASE");
await new Promise(r=>setTimeout(r,200));

    
    const pageSize = 256;
    let address = 0;

    
for (let i = 0; i < hex.length; i += pageSize) {

    const wordAddress = address >> 1;

       let page = hex.slice(i, i + pageSize);

if (page.length < pageSize)
{
    const tmp = new Uint8Array(pageSize).fill(0xFF);
    tmp.set(page);
    page = tmp;
}

       await send(2,[
    0x06,
    (wordAddress >> 24) & 255,
    (wordAddress >> 16) & 255,
    (wordAddress >> 8) & 255,
    wordAddress & 255
]);



       await send(3,[
    0x13,
    (page.length >> 8) & 255,
    page.length & 255,
    0xC1,
    0x0A,
    0x40,
    0x4C,
    0x20,
    0x00,
    0x00,
    ...page
]);
        address += pageSize;

        console.log("FLASH PAGE", i / pageSize);
    await new Promise(r => setTimeout(r,5));
    }

    console.log("UPLOAD COMPLETE");

   // leave programming mode
await send(4, [0x11, 0x01, 0x01]);

console.log("LEAVE PROGMODE");
reader.releaseLock();
writer.releaseLock();
// reset Arduino
await port.setSignals({ dataTerminalReady: false });
await new Promise(r => setTimeout(r,200));
await port.setSignals({ dataTerminalReady: true });
await new Promise(r => setTimeout(r,800));


}
finally
{
    try
    {
        if(reader)
        {
            try { await reader.cancel(); } catch(e){}
            try { reader.releaseLock(); } catch(e){}
        }

        if(writer)
        {
            try { writer.releaseLock(); } catch(e){}
        }

        await new Promise(r=>setTimeout(r,100));

        try { await port.close(); } catch(e){}
    }
    catch(e)
    {
        console.log("PORT CLOSE ERROR", e);
    }

    console.log("PORT CLOSED");
}
}




    
 window.flashNano = async function(port)
{

let writer;
let reader;

try
{
    console.log("START NANO");

    const r = await fetch("./test/BlinkNANO.ino.hex");
    const text = await r.text();

    const hex = parseHex(text);

    await port.open({ baudRate:115200 });
    console.log("PORT OPENED FOR NANO");
    writer = port.writable.getWriter();
    reader = port.readable.getReader();

    async function readByte()
    {
        const res = await reader.read();
        return res.value;
    }

    async function send(data)
    {
        await writer.write(new Uint8Array(data));
    }

    // reset Nano
await port.setSignals({ dataTerminalReady:false });
await new Promise(r=>setTimeout(r,100));

await port.setSignals({ dataTerminalReady:true });
await new Promise(r=>setTimeout(r,200));
   // sync bootloader

let synced = false;

for(let i=0;i<10;i++)
{
    await send([0x30,0x20]);

    try
    {
        const res = await Promise.race([
            reader.read(),
            new Promise((_,reject)=>setTimeout(()=>reject(),100))
        ]);

        if(res.value)
        {
            synced = true;
            break;
        }
    }
    catch(e){}
}

if(!synced)
    throw "NO NANO";

console.log("NANO BOOTLOADER OK");

    const pageSize = 128;
    let address = 0;

    for(let i=0;i<hex.length;i+=pageSize)
    {

        let page = hex.slice(i,i+pageSize);

        if(page.length < pageSize)
        {
            const tmp = new Uint8Array(pageSize).fill(0xFF);
            tmp.set(page);
            page = tmp;
        }

        const wordAddress = address >> 1;

        // LOAD ADDRESS
        await send([
            0x55,
            wordAddress & 0xFF,
            (wordAddress >> 8) & 0xFF,
            0x20
        ]);

        await readByte();

        // PROGRAM PAGE
       await send([
    0x64,
    (pageSize >> 8) & 0xFF,
    pageSize & 0xFF,
    0x46,
    ...page,
    0x20
]);

       const resp = await readByte();
if(!resp) throw "NANO WRITE ERROR";

        address += pageSize;

        console.log("FLASH PAGE", i/pageSize);
    }

    console.log("UPLOAD COMPLETE");

}
finally
{
    if(reader) reader.releaseLock();
    if(writer) writer.releaseLock();

    await port.close();

    console.log("PORT CLOSED");
}

}
