<script>
  
function parseHex(hexText)
{
    const lines = hexText.trim().split(/\r?\n/);

    let upper = 0;
    let maxAddr = 0;
    const mem = {};

    for (const line of lines)
    {
        if (line[0] !== ':') continue;

        const len  = parseInt(line.substr(1,2),16);
        const addr = parseInt(line.substr(3,4),16);
        const type = parseInt(line.substr(7,2),16);

        if (type === 0) // data
        {
            const base = upper + addr;

            for (let i=0;i<len;i++)
            {
                const byte = parseInt(line.substr(9+i*2,2),16);
                mem[base+i] = byte;
                if (base+i > maxAddr) maxAddr = base+i;
            }
        }

        else if (type === 4) // extended linear address
        {
            upper = parseInt(line.substr(9,4),16) << 16;
        }

        else if (type === 1) // EOF
        {
            break;
        }
    }

    const data = new Uint8Array(maxAddr+1).fill(0xFF);

    for (const a in mem)
        data[a] = mem[a];

    return data;
}
async function detectBootloader(port)
{
    await port.open({ baudRate: 115200 });

    // RESET Arduino
    await port.setSignals({ dataTerminalReady: false });
    await new Promise(r => setTimeout(r,200));
    await port.setSignals({ dataTerminalReady: true });
    await new Promise(r => setTimeout(r,500));

    const writer = port.writable.getWriter();
    const reader = port.readable.getReader();

    // STK500v2 SIGN_ON
    const signOn = new Uint8Array([
        0x1B,0x01,0x00,0x01,0x0E,0x01,0x15
    ]);

    await writer.write(signOn);

    let response = null;

    try
    {
        response = await Promise.race([
            reader.read(),
            new Promise((_,reject)=>setTimeout(()=>reject(),600))
        ]);
    }
    catch
    {
        response = null;
    }

    writer.releaseLock();
    reader.releaseLock();

    await port.close();

    if(response && response.value && response.value.length > 0)
    {
        console.log("BOOTLOADER: STK500v2 (MEGA)");
        return "mega2560";
    }

    console.log("BOOTLOADER: STK500v1 (UNO/NANO)");
    return "uno";
}
async function uploadAuto()
{

    const port = await navigator.serial.requestPort({
        filters: [
            { usbVendorId: 0x2341 },
            { usbVendorId: 0x1A86 },
            { usbVendorId: 0x0403 }
        ]
    });

    const board = await detectBootloader(port);

    console.log("DETECTED BOARD:", board);

    if(board === "mega2560")
        await flashMega();

    if(board === "uno")
        alert("UNO/NANO uploader jeszcze nie dodany");

}
window.flashMega = async function () {

    console.log("START MEGA");

    const r = await fetch("./test/BlinkM.ino.hex");
    const text = await r.text();

    const hex = parseHex(text);
console.log("HEX LENGTH", hex.length);
console.log("FIRST BYTES", hex.slice(0,16));
    const port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });

    const writer = port.writable.getWriter();
    const reader = port.readable.getReader();

    function checksum(buf) {
        let cs = 0;
        for (let b of buf) cs ^= b;
        return cs;
    }

    async function send(seq, payload) {

    const size = payload.length;

    const header = [
        0x1B,
        seq,
        (size >> 8) & 255,
        size & 255,
        0x0E
    ];

    const body = [...header, ...payload];

    const cs = checksum(body);

    const msg = new Uint8Array([...body, cs]);

    await writer.write(msg);

    let buffer = [];

    while (true) {

        const { value, done } = await reader.read();

        if (done) break;

        buffer.push(...value);

        if (buffer.length >= 7) break; // minimalny pakiet STK500v2
    }

    console.log("BOOT RESP:", buffer);

    return buffer;
}
    // reset
    await port.setSignals({ dataTerminalReady: false });
    await new Promise(r => setTimeout(r,100));
    await port.setSignals({ dataTerminalReady: true });
    await new Promise(r => setTimeout(r,300));

    console.log("BOOTLOADER READY");

    await send(1,[0x01]);

    console.log("SIGN_ON OK");
    
await send(2,[0x12]);
console.log("CHIP ERASE");
await new Promise(r=>setTimeout(r,200));

    
    const pageSize = 256;
    let address = 0;

    
for (let i = 0; i < hex.length; i += pageSize) {

    const wordAddress = address >> 1;

       let page = hex.slice(i, i + pageSize);

if (page.length < pageSize)
{
    const tmp = new Uint8Array(pageSize).fill(0xFF);
    tmp.set(page);
    page = tmp;
}

       await send(2,[
    0x06,
    (wordAddress >> 24) & 255,
    (wordAddress >> 16) & 255,
    (wordAddress >> 8) & 255,
    wordAddress & 255
]);



       await send(3,[
    0x13,
    (page.length >> 8) & 255,
    page.length & 255,
    0xC1,
    0x0A,
    0x40,
    0x4C,
    0x20,
    0x00,
    0x00,
    ...page
]);
        address += pageSize;

        console.log("FLASH PAGE", i / pageSize);
    await new Promise(r => setTimeout(r,5));
    }

    console.log("UPLOAD COMPLETE");

   // leave programming mode
await send(4, [0x11, 0x01, 0x01]);

console.log("LEAVE PROGMODE");

// reset Arduino
await port.setSignals({ dataTerminalReady: false });
await new Promise(r => setTimeout(r,200));
await port.setSignals({ dataTerminalReady: true });
await new Promise(r => setTimeout(r,800));

writer.releaseLock();
reader.releaseLock();

await port.close();

}
